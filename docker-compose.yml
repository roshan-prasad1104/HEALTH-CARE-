version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pm-postgres-db
    restart: always
    environment:
      POSTGRES_USER: prescrypto
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: prescribes_mythbusters
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pm-redis-cache
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: pm-express-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://prescrypto:securepassword123@db:5432/prescribes_mythbusters?schema=public
      - JWT_SECRET=supersecretkeyforprescrypto
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: pm-vite-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
